services:
  # 1. BAZA DANYCH
  mariadb:
    image: mariadb:lts
    container_name: ticketing-mariadb
    restart: always
    environment:
      # Hasło w cudzysłowach ze względu na znaki specjalne (!@)
      MYSQL_ROOT_PASSWORD: "Q!@3wertyuiop"
      MYSQL_DATABASE: ticketing_db
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  # 2. BROKER WIADOMOŚCI
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ticketing-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  # 3. GŁÓWNE API (Pobierane z GHCR)
  main-api:
    image: ghcr.io/porzeraklon/ticketing-main-api:latest
    container_name: ticketing-main-api
    restart: always
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=mariadb;Port=3306;Database=ticketing_db;User Id=root;Password=Q!@3wertyuiop;
      - RabbitMQ__HostName=rabbitmq
      - Jwt__Key=uzPtn4jksdaDO3uYGzivMBLwlgo7L6AcmxeoEpRe+8M=
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - mariadb
      - rabbitmq

  # 4. WORKER SERVICE (Pobierane z GHCR)
  worker-service:
    image: ghcr.io/porzeraklon/ticketing-worker-service:latest
    container_name: ticketing-worker-service
    restart: always
    ports:
      - "5001:8080"
    environment:
      - RabbitMQ__HostName=rabbitmq
      - Jwt__Key=uzPtn4jksdaDO3uYGzivMBLwlgo7L6AcmxeoEpRe+8M=
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - rabbitmq
      - main-api

volumes:
  mariadb_data:
