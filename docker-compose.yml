services:
  mariadb:
    image: mariadb:lts
    container_name: ticketing-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: twoje_tajne_haslo
      MYSQL_DATABASE: ticketing_db
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ticketing-rabbitmq
    restart: always
    ports:
      - "5672:5672"   # Port dla naszej aplikacji (protokół AMQP)
      - "15672:15672" # Port dla panelu graficznego w przeglądarce

volumes:
  mariadb_data:
