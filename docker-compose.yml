services:
  # 1. BAZA DANYCH
  mariadb:
    image: mariadb:lts
    container_name: ticketing-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: super_tajne_haslo_bazy
      MYSQL_DATABASE: ticketing_db
    ports:
      - "3307:3306" # Port 3307 wystawiony na Twój komputer
    volumes:
      - mariadb_data:/var/lib/mysql

  # 2. BROKER WIADOMOŚCI
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ticketing-rabbitmq
    restart: always
    ports:
      - "5672:5672"   # Port AMQP
      - "15672:15672" # Panel zarządzania UI

  # 3. GŁÓWNE API
  main-api:
    build: 
      context: . # Build Context to główny folder projektu
      dockerfile: MainApi/Dockerfile
    container_name: ticketing-main-api
    restart: always
    ports:
      - "5000:8080" # Mapujemy port 8080 kontenera na 5000 na Twoim komputerze
    environment:
      # Podmieniamy sekrety z appsettings.json!
      - ConnectionStrings__DefaultConnection=Server=mariadb;Port=3306;Database=ticketing_db;User Id=root;Password=super_tajne_haslo_bazy;
      - RabbitMQ__HostName=rabbitmq
      - Jwt__Key=tutaj_wpisz_swoj_bardzo_dlugi_i_bezpieczny_klucz_jwt_ktory_ma_przynajmniej_256_bitow
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - mariadb
      - rabbitmq

  # 4. WORKER SERVICE (SignalR)
  worker-service:
    build:
      context: .
      dockerfile: WorkerService/Dockerfile
    container_name: ticketing-worker-service
    restart: always
    ports:
      - "5001:8080" # Huba SignalR wystawiamy na porcie 5001
    environment:
      - RabbitMQ__HostName=rabbitmq
      - Jwt__Key=tutaj_wpisz_swoj_bardzo_dlugi_i_bezpieczny_klucz_jwt_ktory_ma_przynajmniej_256_bitow
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - rabbitmq
      - main-api # Upewniamy się, że ruszy po głównym API

volumes:
  mariadb_data: